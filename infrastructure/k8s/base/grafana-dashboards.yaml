apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: garlaws
data:
  garlaws-overview.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Garlaws Platform Overview",
        "tags": ["garlaws", "overview"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Application Response Time",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job=\"garlaws-app\"}[5m]))",
                "legendFormat": "95th percentile"
              }
            ]
          },
          {
            "id": 2,
            "title": "Error Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(http_requests_total{status=~\"5..\", job=\"garlaws-app\"}[5m]) / rate(http_requests_total{job=\"garlaws-app\"}[5m]) * 100",
                "legendFormat": "Error rate %"
              }
            ]
          },
          {
            "id": 3,
            "title": "Active Connections",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(http_connections_active)",
                "legendFormat": "Active connections"
              }
            ]
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "timepicker": {},
        "templating": {
          "list": []
        },
        "annotations": {
          "list": []
        },
        "refresh": "5s",
        "schemaVersion": 16,
        "version": 0,
        "links": []
      }
    }