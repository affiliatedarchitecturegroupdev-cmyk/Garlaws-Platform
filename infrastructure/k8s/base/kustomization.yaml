apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: garlaws

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres.yaml
  - postgres-init.yaml
  - redis.yaml
  - app.yaml
  - prometheus.yaml
  - grafana.yaml
  - grafana-provisioning.yaml
  - grafana-dashboards.yaml

images:
  - name: garlaws/garlaws-platform
    newTag: latest

commonLabels:
  app.kubernetes.io/name: garlaws-platform
  app.kubernetes.io/version: "1.0.0"
  app.kubernetes.io/managed-by: kustomize