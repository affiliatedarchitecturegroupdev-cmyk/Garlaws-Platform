apiVersion: apps/v1
kind: Deployment
metadata:
  name: garlaws-postgres
  namespace: garlaws
  labels:
    app: garlaws-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: garlaws-postgres
  template:
    metadata:
      labels:
        app: garlaws-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "garlaws"
        - name: POSTGRES_USER
          value: "garlaws"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: garlaws-secrets
              key: db-password
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: postgres-init
          mountPath: /docker-entrypoint-initdb.d
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - garlaws
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - garlaws
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
      - name: postgres-init
        configMap:
          name: postgres-init-config

---
apiVersion: v1
kind: Service
metadata:
  name: garlaws-postgres
  namespace: garlaws
  labels:
    app: garlaws-postgres
spec:
  selector:
    app: garlaws-postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: garlaws
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: gp3