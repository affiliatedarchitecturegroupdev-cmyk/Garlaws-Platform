# Default values for garlaws-platform

replicaCount: 3

image:
  repository: garlaws/garlaws-platform
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
  hosts:
    - host: garlaws.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: garlaws-tls
      hosts:
        - garlaws.com

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# Database configuration
database:
  host: ""
  port: 5432
  name: garlaws
  user: garlaws
  password: ""

# Redis configuration
redis:
  host: ""
  port: 6379
  password: ""

# Application configuration
config:
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  NEXTAUTH_URL: "https://garlaws.com"

# Monitoring
monitoring:
  enabled: true
  prometheus:
    enabled: true
  grafana:
    enabled: true