name: Garlaws Platform CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  AWS_REGION: 'af-south-1'

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint
        run: npm run lint || true
        
      - name: Run TypeScript check
        run: npm run typecheck || true

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: garlaws-platform/package-lock.json
          
      - name: Install dependencies
        working-directory: ./garlaws-platform
        run: npm ci
        
      - name: Run tests
        working-directory: ./garlaws-platform
        run: npm run test -- --passWithNoTests

  build-api:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: garlaws-platform/package-lock.json
          
      - name: Install dependencies
        working-directory: ./garlaws-platform
        run: npm ci
        
      - name: Build API
        working-directory: ./garlaws-platform
        run: npm run build:api
        
      - name: Upload API build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: garlaws-platform/dist/apps/garlaws-api
          retention-days: 1

  build-frontend:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: garlaws-platform/package-lock.json
          
      - name: Install dependencies
        working-directory: ./garlaws-platform
        run: npm ci
        
      - name: Build Frontend
        working-directory: ./garlaws-platform
        run: npm run build:web
        
      - name: Upload Frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: garlaws-platform/dist/apps/garlaws-corporate-gateway
          retention-days: 1

  docker-build:
    runs-on: ubuntu-latest
    needs: [build-api, build-frontend]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download API build
        uses: actions/download-artifact@v4
        with:
          name: api-build
          path: dist/api
          
      - name: Download Frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/frontend
          
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: garlaws-platform/Dockerfile
          push: false
          tags: garlaws/platform:latest
          cache-from: type=registry,ref=garlaws/platform:buildcache
          cache-to: type=registry,ref=garlaws/platform:buildcache,mode=max

  deploy-staging:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
      - name: Deploy to Staging (Coolify)
        run: echo "Configure Coolify deployment for staging environment"
        
      - name: Run smoke tests
        run: echo "Run smoke tests against staging"

  deploy-production:
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Deploy to Production (Coolify/AWS)
        run: echo "Configure production deployment"
        
      - name: Run smoke tests
        run: echo "Run smoke tests against production"
        
      - name: Notify on success
        if: success()
        run: echo "Deployment successful"